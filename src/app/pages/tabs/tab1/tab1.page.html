<ion-header [translucent]="true">
  <ion-toolbar class="home-toolbar">
    <div class="toolbar-shell">
      <div>
        <p class="eyebrow">Today</p>
        <h1>Weight Tracker</h1>
      </div>
      <button class="profile-pill" type="button" aria-label="Profile menu">
        MG
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <section class="dashboard">
    <article class="balance-card">
      <p class="label">Current Trend</p>
      <h2>184.2 lb</h2>
      <div class="delta positive">-1.6 lb this week</div>
      <div class="progress-track" aria-hidden="true">
        <span style="width: 72%"></span>
      </div>
      <div class="meta-row">
        <span>Goal: 176 lb</span>
        <span>72% reached</span>
      </div>
    </article>

    <section class="quick-actions">
      <button type="button">Log Weight</button>
      <button type="button">Add Meal</button>
      <button type="button">Scan Label</button>
    </section>

    <article class="insight-card">
      <div>
        <p class="label">Weekly consistency</p>
        <h3>5 / 7 check-ins</h3>
      </div>
      <ion-icon name="trending-down-outline" aria-hidden="true"></ion-icon>
    </article>

    <article class="timeline-card">
      <div class="timeline-head">
        <h3>Recent entries</h3>
        <a href="#">See all</a>
      </div>
      <ul>
        <li>
          <span>Today</span>
          <strong>184.2 lb</strong>
        </li>
        <li>
          <span>Yesterday</span>
          <strong>184.6 lb</strong>
        </li>
        <li>
          <span>Mon, Jun 7</span>
          <strong>185.1 lb</strong>
        </li>
      </ul>
    </article>
  </section>

</ion-content>
